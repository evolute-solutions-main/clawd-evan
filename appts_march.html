<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raw Appointments — Mar 1–18, 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.3rem; font-weight: 600; color: #fff; }
  header span { font-size: 0.85rem; color: #64748b; }
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* KPI strip */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .kpi { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 18px 20px; }
  .kpi-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 6px; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; color: #fff; }
  .kpi-sub { font-size: 0.75rem; color: #94a3b8; margin-top: 3px; }

  /* Charts row */
  .charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 20px; }
  .chart-card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* Table */
  .table-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 20px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .table-header h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filters select, .filters input { background: #0f1117; border: 1px solid #2d3148; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; }
  .filters input::placeholder { color: #475569; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { text-align: left; padding: 8px 10px; color: #64748b; font-weight: 500; font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid #2d3148; }
  tbody tr { border-bottom: 1px solid #1e2130; transition: background .12s; }
  tbody tr:hover { background: #1e2235; }
  tbody td { padding: 9px 10px; vertical-align: middle; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: capitalize; }
  .badge-new       { background: #1e3a5f; color: #60a5fa; }
  .badge-confirmed { background: #14392b; color: #4ade80; }
  .badge-cancelled { background: #3b1a1a; color: #f87171; }
  .badge-showed    { background: #2d2059; color: #a78bfa; }
  .badge-noshow    { background: #3b2a10; color: #fb923c; }
  .cal-cold { color: #38bdf8; }
  .cal-meta { color: #c084fc; }
  .text-muted { color: #475569; }
  .pagination { display: flex; gap: 8px; align-items: center; margin-top: 14px; font-size: 0.8rem; color: #64748b; }
  .pagination button { background: #1e2235; border: 1px solid #2d3148; color: #e2e8f0; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .pagination button:disabled { opacity: .35; cursor: default; }
  .pagination button:hover:not(:disabled) { background: #2d3148; }
</style>
</head>

<header>

</header>

<div class="main">

    <div class="table-header">

      <div class="filters">

        </select>
        <select id="filterSetter">
          <option value="">All Setters</option>
        </select>
      </div>
    </div>
    <table>
      <thead>
        <tr>

          <th>Calendar</th>
          <th>Status</th>
          <th>Created By</th>

      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination">
      <button id="prevBtn">← Prev</button>
      <span id="pageInfo"></span>
      <button id="nextBtn">Next →</button>
    </div>
  </div>
</div>

const STATUS_COLORS = {
  new:       '#60a5fa',
  confirmed: '#4ade80',
  cancelled: '#f87171',
  showed:    '#a78bfa',
  noshow:    '#fb923c',
};

const PAGE_SIZE = 30;
let page = 0;
let filtered = [];

function fmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function badge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

function calSpan(cal) {
  const isCold = cal.toLowerCase().includes('cold');
  return `<span class="${isCold ? 'cal-cold' : 'cal-meta'}">${isCold ? 'Cold SMS' : 'Meta'}</span>`;
}

// KPIs
function renderKPIs() {
  const total = RAW.length;
  const confirmed = RAW.filter(a => a.appointmentStatus === 'confirmed').length;
  const cancelled = RAW.filter(a => a.appointmentStatus === 'cancelled').length;
  const showed    = RAW.filter(a => a.appointmentStatus === 'showed').length;
  const noshow    = RAW.filter(a => a.appointmentStatus === 'noshow').length;
  const cold      = RAW.filter(a => a.calendarName.includes('Cold')).length;
  const meta      = RAW.filter(a => !a.calendarName.includes('Cold')).length;

  const cards = [
    { label: 'Total', value: total },
    { label: 'Confirmed', value: confirmed, sub: pct(confirmed, total) },
    { label: 'Cancelled', value: cancelled, sub: pct(cancelled, total) },
    { label: 'Showed', value: showed, sub: pct(showed, total) },
    { label: 'No Show', value: noshow, sub: pct(noshow, total) },
    { label: 'Cold SMS', value: cold, sub: pct(cold, total) },
    { label: 'Meta Inbound', value: meta, sub: pct(meta, total) },
  ];

  document.getElementById('kpis').innerHTML = cards.map(c =>
    `<div class="kpi"><div class="kpi-label">${c.label}</div><div class="kpi-value">${c.value}</div>${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ''}</div>`
  ).join('');
}

function pct(n, total) { return total ? `${Math.round(n/total*100)}%` : '—'; }

// Charts
function renderCharts() {
  const statusCounts = {};
  const calCounts = {};
  const dailyCounts = {};

  for (const a of RAW) {
    statusCounts[a.appointmentStatus] = (statusCounts[a.appointmentStatus] || 0) + 1;
    const calKey = a.calendarName.includes('Cold') ? 'Cold SMS' : 'Meta Inbound';
    calCounts[calKey] = (calCounts[calKey] || 0) + 1;
    const day = a.startTime ? a.startTime.slice(0, 10) : 'unknown';
    dailyCounts[day] = (dailyCounts[day] || 0) + 1;
  }

  const donutOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, padding: 10 } }
    }
  };

  new Chart(document.getElementById('chartStatus'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(statusCounts),
      datasets: [{ data: Object.values(statusCounts), backgroundColor: Object.keys(statusCounts).map(s => STATUS_COLORS[s] || '#94a3b8'), borderWidth: 0 }]
    },
    options: donutOpts
  });

  new Chart(document.getElementById('chartCal'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(calCounts),
      datasets: [{ data: Object.values(calCounts), backgroundColor: ['#38bdf8', '#c084fc'], borderWidth: 0 }]
    },
    options: donutOpts
  });

  const days = Object.keys(dailyCounts).sort();
  new Chart(document.getElementById('chartDaily'), {
    type: 'bar',
    data: {
      labels: days.map(d => { const dt = new Date(d+'T12:00:00Z'); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }),
      datasets: [{ data: days.map(d => dailyCounts[d]), backgroundColor: '#6366f1', borderRadius: 4 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2235' } },
        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2235' } }
      }
    }
  });
}

// Table
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const cal    = document.getElementById('filterCal').value;
  const setter = document.getElementById('filterSetter').value;

  filtered = RAW.filter(a => {
    if (status && a.appointmentStatus !== status) return false;
    if (cal    && a.calendarName !== cal) return false;
    if (setter && a.createdBy !== setter) return false;
    if (search) {
      const hay = [a.contactName, a.email, a.phone, a.createdBy].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  page = 0;
  renderTable();
}

function renderTable() {
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');

  document.getElementById('rowCount').textContent = filtered.length;

  tbody.innerHTML = slice.map(a => `
    <tr>
      <td>${fmt(a.startTime)}</td>
      <td><b>${a.contactName || '<span class="text-muted">—</span>'}</b></td>
      <td>${calSpan(a.calendarName)}</td>
      <td>${badge(a.appointmentStatus)}</td>
      <td>${a.createdBy || '<span class="text-muted">—</span>'}</td>
      <td class="text-muted">${fmt(a.timeCreated)}</td>
      <td class="text-muted">${a.phone || '—'}</td>
      <td class="text-muted">${a.email || '—'}</td>
    </tr>
  `).join('');

  const total = Math.ceil(filtered.length / PAGE_SIZE);
  document.getElementById('pageInfo').textContent = `Page ${page + 1} of ${total || 1}`;
  document.getElementById('prevBtn').disabled = page === 0;
  document.getElementById('nextBtn').disabled = page >= total - 1;
}

// Setter filter options
function populateSetterFilter() {
  const setters = [...new Set(RAW.map(a => a.createdBy).filter(Boolean))].sort();
  const sel = document.getElementById('filterSetter');
  setters.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filterStatus').addEventListener('change', applyFilters);
document.getElementById('filterCal').addEventListener('change', applyFilters);
document.getElementById('filterSetter').addEventListener('change', applyFilters);
document.getElementById('prevBtn').addEventListener('click', () => { page--; renderTable(); });
document.getElementById('nextBtn').addEventListener('click', () => { page++; renderTable(); });

renderKPIs();
renderCharts();
populateSetterFilter();
filtered = [...RAW];
renderTable();
</script>
